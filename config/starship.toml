# =============================================================================
# Starship - Catppuccin Mocha, powerline-style
# Matches kitty + nvim catppuccin mocha theme
# =============================================================================

"$schema" = "https://starship.rs/config-schema.json"

format = """
[оӮ¶](fg:#89b4fa)\
$os\
$username\
[оӮ°](bg:#89b4fa fg:#89b4fa)\
$directory\
[оӮ°](fg:#89b4fa bg:#313244)\
$git_branch\
$git_status\
[оӮ°](fg:#313244 bg:#45475a)\
$c\
$golang\
$java\
$nodejs\
$python\
$rust\
$ruby\
$docker_context\
$kubernetes\
[оӮ°](fg:#45475a bg:#1e1e2e)\
$cmd_duration\
$time\
[оӮ°](fg:#1e1e2e)\
$line_break\
$character"""

right_format = """$status$jobs$battery"""

add_newline = true
command_timeout = 1000
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

# -----------------------------------------------------------------------------
[os]
disabled = false
style = "bg:#89b4fa fg:#1e1e2e"

[os.symbols]
Linux = "у°ҢҪ "
Ubuntu = "у°•Ҳ "
Arch = "у°ЈҮ "
Debian = "у°Јҡ "
Fedora = "у°Јӣ "
Macos = "у°Җө "
Windows = "у°ҚІ "

[username]
show_always = false
style_user = "bg:#89b4fa fg:#1e1e2e bold"
style_root = "bg:#f38ba8 fg:#1e1e2e bold"
format = "[ $user ]($style)"

[directory]
style = "bg:#89b4fa fg:#1e1e2e bold"
format = "[ $path ]($style)[$read_only]($read_only_style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"
read_only_style = "bg:#89b4fa fg:#f38ba8"
home_symbol = "пҖ• "

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Codes" = "у°Ёһ "
"go" = "оҳ§ "

[git_branch]
symbol = "пҗҳ "
style = "bg:#313244"
format = "[[ $symbol$branch ](fg:#89b4fa bg:#313244)]($style)"

[git_status]
style = "bg:#313244"
format = "[[($all_status$ahead_behind )](fg:#a6e3a1 bg:#313244)]($style)"
conflicted = "п„Ә"
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?"
stashed = "вүЎ"
modified = "!"
staged = "+"
renamed = "В»"
deleted = "вңҳ"

[golang]
symbol = "оҳ§ "
style = "bg:#45475a"
format = "[[ $symbol($version) ](fg:#89dceb bg:#45475a)]($style)"
detect_files = ["go.mod", "go.sum", "go.work", ".go-version"]

[java]
symbol = "оү– "
style = "bg:#45475a"
format = "[[ $symbol($version) ](fg:#f38ba8 bg:#45475a)]($style)"

[nodejs]
symbol = "оңҳ "
style = "bg:#45475a"
format = "[[ $symbol($version) ](fg:#a6e3a1 bg:#45475a)]($style)"

[python]
symbol = "оҳҶ "
style = "bg:#45475a"
format = "[[ $symbol($version)( \\($virtualenv\\)) ](fg:#f9e2af bg:#45475a)]($style)"

[rust]
symbol = "оһЁ "
style = "bg:#45475a"
format = "[[ $symbol($version) ](fg:#fab387 bg:#45475a)]($style)"

[ruby]
symbol = "оһ‘ "
style = "bg:#45475a"
format = "[[ $symbol($version) ](fg:#f38ba8 bg:#45475a)]($style)"

[c]
symbol = "оҳһ "
style = "bg:#45475a"
format = "[[ $symbol($version) ](fg:#89b4fa bg:#45475a)]($style)"
detect_extensions = ["c", "h"]

[docker_context]
symbol = "пҢҲ "
style = "bg:#45475a"
format = "[[ $symbol$context ](fg:#89dceb bg:#45475a)]($style)"
only_with_files = true

[kubernetes]
# Show only when KUBECONFIG / in-cluster context is active and env is set
disabled = false
symbol = "уұғҫ "
style = "bg:#45475a"
format = '[[ $symbol$context( \($namespace\)) ](fg:#cba6f7 bg:#45475a)]($style)'
detect_env_vars = ["KUBECONFIG", "KUBERNETES_SERVICE_HOST"]
detect_files = ["Chart.yaml", "kustomization.yaml", "skaffold.yaml"]
detect_folders = [".k8s"]

[cmd_duration]
min_time = 2_000
style = "bg:#1e1e2e"
format = "[[ пү’ $duration ](fg:#f9e2af bg:#1e1e2e)]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "bg:#1e1e2e"
format = "[[ пҗә $time ](fg:#bac2de bg:#1e1e2e)]($style)"

[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vimcmd_symbol = "[вқ®](bold green)"

[status]
disabled = false
symbol = "вңҳ "
style = "bold red"
format = "[$symbol$common_meaning$signal_name$maybe_int]($style)"

[jobs]
symbol = "вңҰ "
style = "bold blue"

[battery]
disabled = true

[package]
disabled = true
